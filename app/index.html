<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0E1A">
<title>TradeMate</title>
<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0B0E1A;color:#E6EAF5;max-width:480px;margin:0 auto;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
button{cursor:pointer;font-family:inherit;-webkit-appearance:none}

/* ── HOME ─────────────────────────────────────────────────────── */
.home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:32px;overflow-y:auto}
.home-logo{font-size:42px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#4D7EF7,#2DD4A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-sub{font-size:18px;color:#4D5880;text-align:center;line-height:1.5;margin-top:-20px}
.inst-cards{display:flex;flex-direction:column;gap:12px;width:100%}
.inst-card{padding:20px 24px;background:#13172A;border:1px solid #252C45;border-radius:16px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;justify-content:space-between}
.inst-card:active{background:#1A1F35;border-color:#4D7EF7}
.inst-card-name{font-size:23px;font-weight:700;letter-spacing:-.3px}
.inst-card-tag{font-size:16px;color:#4D5880;margin-top:2px}
.inst-card-arrow{color:#4D5880;font-size:18px}

/* ── HEADER ───────────────────────────────────────────────────── */
.header{position:sticky;top:0;z-index:100;background:rgba(11,14,26,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #1A1F35;padding:10px 12px 0;flex-shrink:0}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.back-btn{background:none;border:none;color:#4D5880;font-size:17px;padding:4px 0;display:flex;align-items:center;gap:4px;flex-shrink:0}
.back-btn:active{color:#E6EAF5}
.prob-bar{display:flex;gap:6px;margin-left:auto}
.prob-chip{display:flex;align-items:center;gap:5px;background:#13172A;border:1px solid #252C45;border-radius:8px;padding:4px 10px}
.prob-chip-lbl{font-size:13px;color:#4D5880;font-weight:600;letter-spacing:.4px}
.prob-chip-val{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;color:#4D7EF7}
.prob-chip-val.green{color:#2DD4A0}
.prob-chip-val.amber{color:#F5A623}
.prob-chip-val.red{color:#F06969}

/* ── STEP TABS ────────────────────────────────────────────────── */
.step-tabs{display:flex;gap:2px;padding:0 0 10px}
.step-tab{flex:1;text-align:center;font-size:14px;font-weight:600;letter-spacing:.5px;padding:5px 0;border-radius:6px;color:#2E3655;cursor:default}
.step-tab.done{color:#2DD4A0;cursor:pointer}
.step-tab.done:active{opacity:.7}
.step-tab.active{color:#4D7EF7;background:rgba(77,126,247,.12)}

/* ── SCROLL BODY ──────────────────────────────────────────────── */
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 180px}

/* ── SECTION TITLES ───────────────────────────────────────────── */
.sec-ttl{font-size:11px;font-weight:700;letter-spacing:.8px;color:#4D5880;text-transform:uppercase;margin:0 0 4px 2px}
.sec-sub{font-size:12px;color:#2E3655;margin-bottom:12px}
.grp-lbl{font-size:14px;font-weight:600;letter-spacing:.5px;color:#6B7599;text-transform:uppercase;margin:14px 0 6px 2px}

/* ── FACTOR ROWS ──────────────────────────────────────────────── */
.fr{display:flex;align-items:center;min-height:46px;padding:0 4px 0 12px;background:#13172A;border:1px solid #252C45;border-radius:10px;margin-bottom:5px;gap:6px;transition:border-color .12s,background .12s}
.fr.n1{background:#16192E;border-color:#21274A}
.fr.n2{background:#1A1E34;border-color:#252C45}
.fr.ap{border-color:#2DD4A0;background:linear-gradient(135deg,rgba(45,212,160,.08),#13172A)}
.fr.n1.ap{background:linear-gradient(135deg,rgba(45,212,160,.08),#16192E)}
.fr.n2.ap{background:linear-gradient(135deg,rgba(45,212,160,.08),#1A1E34)}
.fr.an{border-color:#F06969;background:linear-gradient(135deg,rgba(240,105,105,.08),#13172A)}
.fr.n1.an{background:linear-gradient(135deg,rgba(240,105,105,.08),#16192E)}
.fr.n2.an{background:linear-gradient(135deg,rgba(240,105,105,.08),#1A1E34)}
.fr-name{flex:1;font-size:18px;line-height:1.3}
.fr-wt{font-size:13px;font-family:ui-monospace,monospace;color:#6B7599;flex-shrink:0;min-width:36px;text-align:right}
.fr-btns{display:flex;gap:3px;flex-shrink:0}
.fb{width:34px;height:34px;border-radius:7px;border:1px solid #252C45;background:transparent;color:#3E4870;font-size:23px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .1s,border-color .1s,color .1s}
.fb:active{opacity:.7}
.fr.ap .fb.fbp{background:#2DD4A0;border-color:#2DD4A0;color:#0B0E1A}
.fr.an .fb.fbn{background:#F06969;border-color:#F06969;color:#0B0E1A}

/* ── GATE SECTIONS ────────────────────────────────────────────── */
.gate{background:#13172A;border:1px solid #252C45;border-radius:13px;margin-bottom:8px;overflow:hidden}
.gate-head{display:flex;align-items:center;justify-content:space-between;padding:11px 10px 11px 14px;gap:8px}
.gate-q{font-size:17px;color:#C8D0E8;flex:1;line-height:1.35}
.gate-btns{display:flex;gap:5px;flex-shrink:0}
.gbtn{padding:5px 13px;border-radius:7px;border:1px solid #252C45;background:transparent;color:#8892B0;font-size:16px;font-weight:600}
.gbtn.gy{border-color:#2DD4A0;color:#2DD4A0;background:rgba(45,212,160,.08)}
.gbtn.gn{border-color:#3E4870;color:#E6EAF5;background:#1A1F35}
.gate-body{display:none;padding:0 8px 8px}
.gate-body.open{display:block}

/* ── SUB-GATE ─────────────────────────────────────────────────── */
.sg{background:#1A1F35;border:1px solid #252C45;border-radius:10px;margin-bottom:8px;overflow:hidden}
.sg-head{display:flex;align-items:center;justify-content:space-between;padding:9px 8px 9px 12px;gap:8px}
.sg-q{font-size:16px;color:#A8B2CC;flex:1;line-height:1.3}
.sg-body{display:none;padding:0 4px 6px}
.sg-body.open{display:block}
.grp-sublbl{font-size:13px;font-weight:600;letter-spacing:.5px;color:#5A6285;text-transform:uppercase;margin:8px 0 5px 4px}

/* ── CTA ──────────────────────────────────────────────────────── */
.cta-wrap{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;padding:10px 12px 20px;background:linear-gradient(to top,#0B0E1A 60%,transparent);pointer-events:none}
.cta-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4D7EF7,#3B6AE8);border:none;border-radius:12px;color:#fff;font-size:20px;font-weight:700;letter-spacing:.2px;pointer-events:all}
.cta-btn:active{opacity:.85}
.cta-back-btn{width:100%;padding:10px;background:transparent;border:1px solid #252C45;border-radius:12px;color:#6B7599;font-size:16px;font-weight:600;pointer-events:all;margin-top:6px}
.cta-back-btn:active{opacity:.7}

/* ── ENTRY MODEL TABS ─────────────────────────────────────────── */
.model-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.mtab{padding:7px 12px;background:#13172A;border:1px solid #252C45;border-radius:8px;color:#4D5880;font-size:16px;font-weight:600}
.mtab.active{background:rgba(77,126,247,.15);border-color:#4D7EF7;color:#4D7EF7}

/* ── RESULTS ──────────────────────────────────────────────────── */
.res-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.res-card{background:#13172A;border:1px solid #252C45;border-radius:14px;padding:18px 20px}
.res-card-lbl{font-size:14px;font-weight:600;letter-spacing:.6px;color:#4D5880;text-transform:uppercase;margin-bottom:6px}
.res-card-val{font-size:55px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1}
.res-card-val.green{color:#2DD4A0}
.res-card-val.amber{color:#F5A623}
.res-card-val.red{color:#F06969}
.res-card-val.dim{color:#3E4870}
.res-card-meta{font-size:16px;color:#4D5880;margin-top:6px}
.res-actions{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.res-btn{padding:13px;border-radius:11px;border:1px solid #252C45;background:#13172A;color:#E6EAF5;font-size:18px;font-weight:600}
.res-btn.primary{background:linear-gradient(135deg,#4D7EF7,#3B6AE8);border-color:transparent;color:#fff}
.res-btn:active{opacity:.8}

/* ── SCROLLBAR ────────────────────────────────────────────────── */
.scroll-body::-webkit-scrollbar{width:3px}
.scroll-body::-webkit-scrollbar-track{background:transparent}
.scroll-body::-webkit-scrollbar-thumb{background:#252C45;border-radius:2px}

/* ── SYNC + REPORT ───────────────────────────────────────────────── */
.sync-badge{font-size:11px;color:#2DD4A0;letter-spacing:.3px;padding:5px 12px;background:rgba(45,212,160,.08);border:1px solid rgba(45,212,160,.2);border-radius:8px;margin-bottom:8px;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(11,14,26,.92);z-index:200;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:16px}
.modal-box{background:#13172A;border:1px solid #252C45;border-radius:16px;padding:20px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:10px;margin:auto}
.modal-title{font-size:15px;font-weight:700;color:#E6EAF5}
.report-pre{background:#0B0E1A;border:1px solid #1A1F35;border-radius:10px;padding:14px;font-size:11px;font-family:ui-monospace,monospace;color:#9DA8C7;overflow-x:auto;white-space:pre;line-height:1.5;max-height:50vh;overflow-y:auto}
</style>
</head>

// ─── STATE ─────────────────────────────────────────────────────────────────
const S = { inst:null, step:'home', fac:{}, gates:{}, model:null, _report:null };
const STEPS = ['daily','h4','h1','entry'];

// ─── SYNC CONFIG (edit these once) ──────────────────────────────────────────
const FB_URL = '';        // e.g. https://my-app-default-rtdb.firebaseio.com
const FB_SECRET = '';     // from Project Settings > Service Accounts > Database secrets

let DEVICE_ID = localStorage.getItem('tm_did');
if (!DEVICE_ID) { DEVICE_ID = Math.random().toString(36).slice(2,10); localStorage.setItem('tm_did', DEVICE_ID); }

// ─── SYNC ────────────────────────────────────────────────────────────────────
let _syncTimer = null;
let _sseSource = null;
let _lastReportTs = 0;
let _remoteMode = false;

function syncEnabled() { return !!(FB_URL && FB_SECRET); }
function fbPath(inst) { return FB_URL + '/latest/' + inst + '.json?auth=' + FB_SECRET; }

function pushState() {
  if (!syncEnabled() || !S.inst) return;
  const body = JSON.stringify({
    inst:S.inst, step:S.step, fac:S.fac, gates:S.gates, model:S.model,
    report:S._report||null, deviceId:DEVICE_ID, ts:Date.now()
  });
  fetch(fbPath(S.inst), {method:'PUT', body:body, headers:{'Content-Type':'application/json'}}).catch(function(){});
}

function schedulePush() {
  if (!syncEnabled()) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(pushState, 600);
}

function applyRemoteState(snap) {
  if (!snap || snap.deviceId === DEVICE_ID) return;
  S.inst = snap.inst; S.step = snap.step;
  S.fac = snap.fac || {}; S.gates = snap.gates || {};
  S.model = snap.model || null; S._report = snap.report || null;
  _remoteMode = true;
  render();
  if (snap.report && snap.report.ts > _lastReportTs) {
    _lastReportTs = snap.report.ts;
    showReportModal(snap.report.markdown);
  }
}

function startSSE(inst) {
  if (!syncEnabled()) return;
  if (_sseSource) { _sseSource.close(); _sseSource = null; }
  var es = new EventSource(fbPath(inst));
  es.addEventListener('put',   function(e) { try { applyRemoteState(JSON.parse(e.data).data); } catch(x){} });
  es.addEventListener('patch', function(e) { try { applyRemoteState(JSON.parse(e.data).data); } catch(x){} });
  _sseSource = es;
}

function stopSSE() {
  if (_sseSource) { _sseSource.close(); _sseSource = null; }
  _remoteMode = false;
}
const STEP_LABELS = { daily:'Daily', h4:'4H', h1:'H1', entry:'Entry' };

// ─── CALCULATION ───────────────────────────────────────────────────────────
function collectItems(items, acc) {
  for (const item of items) {
    if (item.type === 'factor') {
      const d = S.fac[item.id];
      if (d) acc.push({ w:item.weight, d });
    } else if (item.type === 'nested-gate') {
      if (S.gates[item.id] === true) collectItems(item.items, acc);
    }
  }
}

function collectAll(inclEntry) {
  if (!S.inst) return [];
  const data = DATA[S.inst];
  const acc = [];
  for (const sk of ['daily','h4','h1']) {
    const sec = data.sections[sk];
    for (const fitem of sec.always) {
      const d = S.fac[fitem.id];
      if (d) acc.push({ w:fitem.weight, d });
    }
    for (const gate of sec.gates) {
      if (S.gates[gate.id] === true) collectItems(gate.items, acc);
    }
  }
  if (inclEntry && S.model) {
    const ef = data.entry[S.model] || [];
    for (const fitem of ef) {
      if (fitem.type === 'gate-factor') {
        const d = S.fac[fitem.id];
        if (d === 'neg') acc.push({ w:fitem.weight, d });   // only No applies gate weight
        if (S.gates[fitem.id] === true) collectItems(fitem.items, acc);
      } else {
        const d = S.fac[fitem.id];
        if (d) acc.push({ w:fitem.weight, d });
      }
    }
  }
  return acc;
}

function calcP(arr) {
  if (!arr.length) return null;
  const pos = arr.filter(x=>x.d==='pos').reduce((s,x)=>s+x.w,0);
  const neg = arr.filter(x=>x.d==='neg').reduce((s,x)=>s+x.w,0);
  return (pos - 0.5*neg) / arr.length;
}

function getProbs() {
  const conf = collectAll(false);
  const all  = collectAll(true);
  return {
    dir: calcP(conf), dirN: conf.length,
    trd: calcP(all),  trdN: all.length,
  };
}

function pColor(inst, v) {
  if (v === null) return '';
  const threshold = inst === 'xau' ? 0.50 : 0.57;
  return v >= threshold ? 'green' : 'red';
}

function pFmt(v) {
  return v === null ? '—' : (v * 100).toFixed(1) + '%';
}

function pThreshold(inst) {
  return inst === 'xau' ? '50%' : '57%';
}

// ─── RENDERING ─────────────────────────────────────────────────────────────
function frCls(depth, dir) {
  let c = 'fr';
  if (depth === 1) c += ' n1';
  if (depth === 2) c += ' n2';
  if (dir === 'pos') c += ' ap';
  else if (dir === 'neg') c += ' an';
  return c;
}

function renderFR(fitem, depth) {
  const d = S.fac[fitem.id] || null;
  return `<div id="fr_${fitem.id}" class="${frCls(depth,d)}" data-d="${depth}">
    <span class="fr-name">${fitem.label}</span>
    <span class="fr-wt">${fitem.weight.toFixed(3)}</span>
    <div class="fr-btns">
      <button class="fb fbp" onclick="sf('${fitem.id}','pos',${fitem.weight})">+</button>
      <button class="fb fbn" onclick="sf('${fitem.id}','neg',${fitem.weight})">−</button>
    </div>
  </div>`;
}

function renderGateFactor(item) {
  const open = S.gates[item.id] === true;
  const d = S.fac[item.id];
  const yn = d === 'pos' ? true : d === 'neg' ? false : undefined;
  return `<div class="gate">
    <div class="gate-head">
      <div class="gate-q">${item.question}</div>
      <div class="gate-btns">
        <button class="gbtn${yn===true?' gy':''}" onclick="sgf('${item.id}',true)">Yes</button>
        <button class="gbtn${yn===false?' gn':''}" onclick="sgf('${item.id}',false)">No</button>
      </div>
    </div>
    <div id="gfb_${item.id}" class="gate-body${open?' open':''}">
      ${open ? renderItems(item.items, 1) : ''}
    </div>
  </div>`;
}

function renderItems(items, depth) {
  let h = '';
  for (const item of items) {
    if (item.type === 'factor') {
      h += renderFR(item, depth);
    } else if (item.type === 'nested-gate') {
      const open = S.gates[item.id] === true;
      const yn = S.gates[item.id];
      h += `<div class="sg">
        <div class="sg-head">
          <div class="sg-q">${item.question}</div>
          <div class="gate-btns">
            <button class="gbtn${yn===true?' gy':''}" onclick="ssg('${item.id}',true)">Yes</button>
            <button class="gbtn${yn===false?' gn':''}" onclick="ssg('${item.id}',false)">No</button>
          </div>
        </div>
        <div id="sgb_${item.id}" class="sg-body${open?' open':''}">
          ${open ? renderItems(item.items, depth+1) : ''}
        </div>
      </div>`;
    } else if (item.type === 'label') {
      h += `<div class="grp-sublbl">${item.text}</div>`;
    }
  }
  return h;
}

function renderGates(gates) {
  let h = '';
  for (const gate of gates) {
    const open = S.gates[gate.id] === true;
    const yn = S.gates[gate.id];
    h += `<div class="gate">
      <div class="gate-head">
        <div class="gate-q">${gate.question}</div>
        <div class="gate-btns">
          <button class="gbtn${yn===true?' gy':''}" onclick="sg('${gate.id}',true)">Yes</button>
          <button class="gbtn${yn===false?' gn':''}" onclick="sg('${gate.id}',false)">No</button>
        </div>
      </div>
      <div id="gb_${gate.id}" class="gate-body${open?' open':''}">
        ${open ? renderItems(gate.items, 1) : ''}
      </div>
    </div>`;
  }
  return h;
}

function stepState(step) {
  const idx = STEPS.indexOf(step);
  const cur = STEPS.indexOf(S.step);
  if (S.step === 'results') return 'done';
  if (idx < cur) return 'done';
  if (idx === cur) return 'active';
  return '';
}

function renderHeader(showEntry) {
  const data = DATA[S.inst];
  const p = getProbs();
  const tabs = STEPS.map(s => {
    const st = stepState(s);
    const clickable = st === 'done' || st === 'active';
    const onclick = clickable ? ` onclick="nav('${s}')"` : '';
    return `<div class="step-tab${st?' '+st:''}"${onclick}>${STEP_LABELS[s]}</div>`;
  }).join('');
  return `<div class="header">
    <div class="header-top">
      <button class="back-btn" onclick="goHome()">← ${data.name}</button>
      <div class="prob-bar">
        <div class="prob-chip">
          <span class="prob-chip-lbl">DIR</span>
          <span id="pdir" class="prob-chip-val ${pColor(S.inst, p.dir)}">${pFmt(p.dir)}</span>

        <div class="prob-chip">
          <span class="prob-chip-lbl">TRADE</span>
          <span id="ptrd" class="prob-chip-val ${pColor(S.inst, p.trd)}">${pFmt(p.trd)}</span>
        </div>
      </div>
    </div>
    <div class="step-tabs">${tabs}</div>
  </div>`;
}

function renderSection(sk) {
  const sec = DATA[S.inst].sections[sk];
  const idx = STEPS.indexOf(sk);
  const next = STEPS[idx+1] || 'results';
  const nextLabel = next === 'results' ? 'View Results' : STEP_LABELS[next];
  const prev = idx > 0 ? STEPS[idx-1] : null;
  const prevLabel = prev ? STEP_LABELS[prev] : null;
  const backBtn = prev
    ? `<button class="cta-back-btn" onclick="nav('${prev}')">← Back to ${prevLabel}</button>`
    : '';
  const alwaysH = sec.always.map(fi => renderFR(fi, 0)).join('');
  const gatesH = renderGates(sec.gates);
  return `<div class="scroll-body">
    <div class="grp-lbl">Market Structure</div>
    ${alwaysH}
    <div class="grp-lbl">Confluences</div>
    ${gatesH}
  </div>
  <div class="cta-wrap">
    <button class="cta-btn" onclick="nav('${next}')">Continue to ${nextLabel} →</button>
    ${backBtn}
  </div>`;
}

function renderEntry() {
  const models = Object.keys(DATA[S.inst].entry);
  const tabsH = models.map(m =>
    `<button class="mtab${S.model===m?' active':''}" onclick="selM('${m}')">${m}</button>`
  ).join('');
  let factorsH = '';
  if (S.model) {
    factorsH = DATA[S.inst].entry[S.model].map(fi =>
      fi.type === 'gate-factor' ? renderGateFactor(fi) : renderFR(fi, 0)
    ).join('');
  } else {
    factorsH = `<div style="color:#3E4870;font-size:13px;padding:20px 4px">Select an entry model above to view its factors.</div>`;
  }
  return `<div class="scroll-body">
    <div class="grp-lbl">Entry Model</div>
    <div class="model-tabs">${tabsH}</div>
    ${factorsH}
  </div>
  <div class="cta-wrap">
    <button class="cta-btn" onclick="nav('results')">View Results →</button>
    <button class="cta-back-btn" onclick="nav('h1')">← Back to H1</button>
  </div>`;
}

function renderResults() {
  const p = getProbs();
  const instName = DATA[S.inst].name;
  const syncBadge = _remoteMode ? '<div class="sync-badge">📡 Live — synced from mobile</div>' : '';
  return `<div class="scroll-body">
    <div class="grp-lbl">Results — ${instName}</div>
    ${syncBadge}
    <div class="res-cards">
      <div class="res-card">
        <div class="res-card-lbl">Directional Probability</div>
        <div class="res-card-val ${pColor(S.inst, p.dir)}">${pFmt(p.dir)}</div>
        <div class="res-card-meta">${p.dirN} confluence factor${p.dirN!==1?'s':''} · threshold ${pThreshold(S.inst)}</div>
      </div>
      <div class="res-card">
        <div class="res-card-lbl">Trade Probability</div>
        <div class="res-card-val ${pColor(S.inst, p.trd)}">${pFmt(p.trd)}</div>
        <div class="res-card-meta">${p.trdN} total factor${p.trdN!==1?'s':''} · threshold ${pThreshold(S.inst)}${S.model?' · '+S.model:''}</div>
      </div>
    </div>
    <div class="res-actions">
      <button class="res-btn primary" onclick="generateReport()">Generate Report</button>
      <button class="res-btn" onclick="restart()">New Analysis (${instName})</button>
      <button class="res-btn" onclick="goHome()">Change Instrument</button>
    </div>
  </div>`;
}

function renderHome() {
  return `<div class="home">
    <div class="home-logo">TradeMate</div>
    <div class="home-sub">Top-down confluence probability calculator</div>
    <div class="inst-cards">
      <div class="inst-card" onclick="startInst('eu')">
        <div>
          <div class="inst-card-name">EUR/USD</div>
          <div class="inst-card-tag">Daily → 4H → H1 → Entry</div>
        </div>
        <div class="inst-card-arrow">›</div>
      </div>
      <div class="inst-card" onclick="startInst('xau')">
        <div>
          <div class="inst-card-name">XAU/USD</div>
          <div class="inst-card-tag">Daily → 4H → H1 → Entry</div>
        </div>
        <div class="inst-card-arrow">›</div>
      </div>
    </div>
  </div>`;
}

function render() {
  const app = document.getElementById('app');
  if (S.step === 'home') {
    app.innerHTML = renderHome();
    return;
  }
  let inner = '';
  if (S.step === 'results') {
    inner = renderResults();
  } else if (S.step === 'entry') {
    inner = renderEntry();
  } else {
    inner = renderSection(S.step);
  }
  app.innerHTML = renderHeader() + inner;
  const sb = app.querySelector('.scroll-body');
  if (sb) sb.scrollTop = 0;
}

// ─── PARTIAL DOM UPDATES ───────────────────────────────────────────────────
function updateRow(id) {
  const el = document.getElementById('fr_' + id);
  if (!el) return;
  const depth = parseInt(el.dataset.d || '0');
  el.className = frCls(depth, S.fac[id] || null);
}

function updateChips() {
  const p = getProbs();
  const pd = document.getElementById('pdir');
  const pt = document.getElementById('ptrd');
  if (pd) { pd.textContent = pFmt(p.dir); pd.className = 'prob-chip-val ' + pColor(S.inst, p.dir); }
  if (pt) { pt.textContent = pFmt(p.trd); pt.className = 'prob-chip-val ' + pColor(S.inst, p.trd); }
}

// ─── ACTIONS ───────────────────────────────────────────────────────────────
function sf(id, dir, w) {
  S.fac[id] = S.fac[id] === dir ? null : dir;
  updateRow(id);
  updateChips();
  schedulePush();
}

function sg(id, val) {
  S.gates[id] = val;
  const body = document.getElementById('gb_' + id);
  const head = body && body.previousElementSibling;
  if (body) {
    body.className = 'gate-body' + (val ? ' open' : '');
    if (val && !body.innerHTML.trim()) {
      const gate = findGate(id);
      if (gate) body.innerHTML = renderItems(gate.items, 1);
    }
  }
  if (head) {
    const btns = head.querySelectorAll('.gbtn');
    if (btns[0]) btns[0].className = 'gbtn' + (val === true ? ' gy' : '');
    if (btns[1]) btns[1].className = 'gbtn' + (val === false ? ' gn' : '');
  }
  updateChips();
  schedulePush();
}

function ssg(id, val) {
  S.gates[id] = val;
  const body = document.getElementById('sgb_' + id);
  const head = body && body.previousElementSibling;
  if (body) {
    body.className = 'sg-body' + (val ? ' open' : '');
    if (val && !body.innerHTML.trim()) {
      const sg = findSubGate(id);
      if (sg) body.innerHTML = renderItems(sg.items, 2);
    }
  }
  if (head) {
    const btns = head.querySelectorAll('.gbtn');
    if (btns[0]) btns[0].className = 'gbtn' + (val === true ? ' gy' : '');
    if (btns[1]) btns[1].className = 'gbtn' + (val === false ? ' gn' : '');
  }
  updateChips();
  schedulePush();
}

function sgf(id, val) {
  S.fac[id] = val ? 'pos' : 'neg';
  S.gates[id] = val;
  const body = document.getElementById('gfb_' + id);
  const head = body && body.previousElementSibling;
  if (body) {
    body.className = 'gate-body' + (val ? ' open' : '');
    if (val && !body.innerHTML.trim()) {
      const item = findGateFactor(id);
      if (item) body.innerHTML = renderItems(item.items, 1);
    }
  }
  if (head) {
    const btns = head.querySelectorAll('.gbtn');
    if (btns[0]) btns[0].className = 'gbtn' + (val === true ? ' gy' : '');
    if (btns[1]) btns[1].className = 'gbtn' + (val === false ? ' gn' : '');
  }
  updateChips();
  schedulePush();
}

function findGateFactor(id) {
  if (!S.inst) return null;
  const entry = DATA[S.inst].entry;
  for (const model of Object.values(entry)) {
    for (const item of model) {
      if (item.type === 'gate-factor' && item.id === id) return item;
    }
  }
  return null;
}

function findGate(id) {
  if (!S.inst) return null;
  const data = DATA[S.inst];
  for (const sk of ['daily','h4','h1']) {
    for (const g of data.sections[sk].gates) {
      if (g.id === id) return g;
    }
  }
  return null;
}

function findSubGate(id) {
  if (!S.inst) return null;
  const data = DATA[S.inst];
  for (const sk of ['daily','h4','h1']) {
    for (const g of data.sections[sk].gates) {
      for (const item of g.items) {
        if (item.type === 'nested-gate' && item.id === id) return item;
      }
    }
  }
  return null;
}

function selM(model) {
  S.model = model;
  render();
  schedulePush();
}

function nav(step) {
  S.step = step;
  render();
  schedulePush();
}

function startInst(inst) {
  S.inst = inst;
  S.step = 'daily';
  S.fac = {};
  S.gates = {};
  S.model = null;
  S._report = null;
  _remoteMode = false;
  render();
  startSSE(inst);
}

function goHome() {
  S.step = 'home';
  render();
  stopSSE();
}

function restart() {
  const inst = S.inst;
  S.fac = {};
  S.gates = {};
  S.model = null;
  S._report = null;
  S.step = 'daily';
  _remoteMode = false;
  render();
  schedulePush();
}

// ─── REPORT ──────────────────────────────────────────────────────────────────
function buildReportMarkdown() {
  var p = getProbs();
  var instName = DATA[S.inst].name;
  var date = new Date().toISOString().slice(0,10);
  function yn(d) { return d === 'pos' ? 'Yes' : d === 'neg' ? 'No' : null; }
  var thr = S.inst === 'xau' ? 0.50 : 0.57;
  function sigStr(v) { return v===null ? '—' : v>=thr ? '🟢 STRONG' : '🔴 WEAK'; }
  var IND = '    ';

  var lines = ['## ' + instName + ' — ' + date, ''];
  lines.push('| Confluence Factor | Factor Support | Weight |');
  lines.push('|---|---|---|');

  ['daily','h4','h1'].forEach(function(sk) {
    var sec = DATA[S.inst].sections[sk];
    var tf = sec.label;
    sec.always.forEach(function(fi) {
      var d = S.fac[fi.id];
      if (d) lines.push('| ' + tf + ' ' + fi.label + ' | ' + yn(d) + ' | ' + fi.weight.toFixed(4) + ' |');
    });
    sec.gates.forEach(function(gate) {
      if (S.gates[gate.id] !== true) return;
      gate.items.forEach(function(item) {
        if (item.type === 'label') return;
        if (item.type === 'factor') {
          var d = S.fac[item.id];
          if (d) lines.push('| ' + tf + ' ' + gate.question + ' - ' + item.label + ' | ' + yn(d) + ' | ' + item.weight.toFixed(4) + ' |');
        } else if (item.type === 'nested-gate') {
          if (S.gates[item.id] !== true) return;
          item.items.forEach(function(sub) {
            if (sub.type !== 'factor') return;
            var d = S.fac[sub.id];
            if (d) lines.push('| ' + IND + item.question + ' - ' + sub.label + ' | ' + yn(d) + ' | ' + sub.weight.toFixed(4) + ' |');
          });
        }
      });
    });
  });

  if (S.model && DATA[S.inst].entry[S.model]) {
    lines.push('| **Entry: ' + S.model + '** | — | — |');
    DATA[S.inst].entry[S.model].forEach(function(fi) {
      if (fi.type === 'gate-factor') {
        var d = S.fac[fi.id];
        if (d === 'neg') lines.push('| ' + fi.question + ' | No | ' + fi.weight.toFixed(4) + ' |');
        if (S.gates[fi.id] === true) {
          fi.items.forEach(function(sub) {
            if (sub.type !== 'factor') return;
            var ds = S.fac[sub.id];
            if (ds) lines.push('| ' + IND + sub.label + ' | ' + yn(ds) + ' | ' + sub.weight.toFixed(4) + ' |');
          });
        }
      } else {
        var d = S.fac[fi.id];
        if (d) lines.push('| ' + fi.label + ' | ' + yn(d) + ' | ' + fi.weight.toFixed(4) + ' |');
      }
    });
  }

  lines.push('');
  lines.push('| Metric | Value | Signal |');
  lines.push('|--------|-------|--------|');
  lines.push('| DIR Probability | ' + pFmt(p.dir) + ' | ' + sigStr(p.dir) + ' |');
  lines.push('| TRADE Probability | ' + pFmt(p.trd) + ' | ' + sigStr(p.trd) + ' |');
  lines.push('| Confluence Factors | ' + p.dirN + ' | — |');
  lines.push('| Total Factors (w/ entry) | ' + p.trdN + ' | — |');
  return lines.join('\n');
}

function generateReport() {
  var md = buildReportMarkdown();
  S._report = { generated:true, ts:Date.now(), markdown:md };
  localStorage.setItem('tm_report_' + S.inst, JSON.stringify(S._report));
  pushState();
  showReportModal(md);
}

function showReportModal(md) {
  var existing = document.getElementById('report-modal');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.id = 'report-modal';
  el.className = 'modal-overlay';
  el.dataset.md = md;
  el.innerHTML =
    '<div class="modal-box">' +
    '<div class="modal-title">Analysis Report</div>' +
    '<pre class="report-pre">' + md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>' +
    '<button class="res-btn primary" id="copy-btn" onclick="copyReport()">Copy Report</button>' +
    '<button class="res-btn" onclick="closeModal()">Close</button>' +
    '</div>';
  document.body.appendChild(el);
}

function copyReport() {
  var el = document.getElementById('report-modal');
  var md = el ? el.dataset.md : '';
  var btn = document.getElementById('copy-btn');
  function ok() { if (btn) { btn.textContent='✓ Copied!'; setTimeout(function(){ btn.textContent='Copy Report'; },1500); } }
  if (navigator.clipboard) { navigator.clipboard.writeText(md).then(ok).catch(function(){ fallbackCopy(md,ok); }); }
  else { fallbackCopy(md, ok); }
}

function fallbackCopy(text, cb) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(x) {}
  document.body.removeChild(ta);
}

function closeModal() {
  var el = document.getElementById('report-modal');
  if (el) el.remove();
}

// ─── INIT ──────────────────────────────────────────────────────────────────
render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
