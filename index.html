<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0E1A">
<title>TradeMate</title>
<link rel="manifest" href="/trademate/manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0B0E1A;color:#E6EAF5;max-width:480px;margin:0 auto;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
button{cursor:pointer;font-family:inherit;-webkit-appearance:none}

/* ── HOME ─────────────────────────────────────────────────────── */
.home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:32px;overflow-y:auto}
.home-logo{font-size:42px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#4D7EF7,#2DD4A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-sub{font-size:18px;color:#4D5880;text-align:center;line-height:1.5;margin-top:-20px}
.inst-cards{display:flex;flex-direction:column;gap:12px;width:100%}
.inst-card{padding:20px 24px;background:#13172A;border:1px solid #252C45;border-radius:16px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;justify-content:space-between}
.inst-card:active{background:#1A1F35;border-color:#4D7EF7}
.inst-card-name{font-size:23px;font-weight:700;letter-spacing:-.3px}
.inst-card-tag{font-size:16px;color:#4D5880;margin-top:2px}
.inst-card-arrow{color:#4D5880;font-size:18px}

/* ── HEADER ───────────────────────────────────────────────────── */
.header{position:sticky;top:0;z-index:100;background:rgba(11,14,26,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #1A1F35;padding:10px 12px 0;flex-shrink:0}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.back-btn{background:none;border:none;color:#4D5880;font-size:17px;padding:4px 0;display:flex;align-items:center;gap:4px;flex-shrink:0}
.back-btn:active{color:#E6EAF5}
.prob-bar{display:flex;gap:6px;margin-left:auto}
.prob-chip{display:flex;align-items:center;gap:5px;background:#13172A;border:1px solid #252C45;border-radius:8px;padding:4px 10px}
.prob-chip-lbl{font-size:13px;color:#4D5880;font-weight:600;letter-spacing:.4px}
.prob-chip-val{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;color:#4D7EF7}
.prob-chip-val.green{color:#2DD4A0}
.prob-chip-val.amber{color:#F5A623}
.prob-chip-val.red{color:#F06969}

/* ── STEP TABS ────────────────────────────────────────────────── */
.step-tabs{display:flex;gap:2px;padding:0 0 10px}
.step-tab{flex:1;text-align:center;font-size:14px;font-weight:600;letter-spacing:.5px;padding:5px 0;border-radius:6px;color:#2E3655;cursor:default}
.step-tab.done{color:#2DD4A0;cursor:pointer}
.step-tab.done:active{opacity:.7}
.step-tab.active{color:#4D7EF7;background:rgba(77,126,247,.12)}
.step-tab.nav{color:#3E4870;cursor:pointer}
.step-tab.nav:active{opacity:.7}

/* ── SCROLL BODY ──────────────────────────────────────────────── */
.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 180px}

/* ── SECTION TITLES ───────────────────────────────────────────── */
.sec-ttl{font-size:11px;font-weight:700;letter-spacing:.8px;color:#4D5880;text-transform:uppercase;margin:0 0 4px 2px}
.sec-sub{font-size:12px;color:#2E3655;margin-bottom:12px}
.grp-lbl{font-size:14px;font-weight:600;letter-spacing:.5px;color:#6B7599;text-transform:uppercase;margin:14px 0 6px 2px}

/* ── FACTOR ROWS ──────────────────────────────────────────────── */
.fr{display:flex;align-items:center;min-height:46px;padding:0 4px 0 12px;background:#13172A;border:1px solid #252C45;border-radius:10px;margin-bottom:5px;gap:6px;transition:border-color .12s,background .12s}
.fr.n1{background:#16192E;border-color:#21274A}
.fr.n2{background:#1A1E34;border-color:#252C45}
.fr.ap{border-color:#2DD4A0;background:linear-gradient(135deg,rgba(45,212,160,.08),#13172A)}
.fr.n1.ap{background:linear-gradient(135deg,rgba(45,212,160,.08),#16192E)}
.fr.n2.ap{background:linear-gradient(135deg,rgba(45,212,160,.08),#1A1E34)}
.fr.an{border-color:#F06969;background:linear-gradient(135deg,rgba(240,105,105,.08),#13172A)}
.fr.n1.an{background:linear-gradient(135deg,rgba(240,105,105,.08),#16192E)}
.fr.n2.an{background:linear-gradient(135deg,rgba(240,105,105,.08),#1A1E34)}
.fr-name{flex:1;font-size:18px;line-height:1.3}
.fr-wt{font-size:13px;font-family:ui-monospace,monospace;color:#6B7599;flex-shrink:0;min-width:36px;text-align:right}
.fr-btns{display:flex;gap:3px;flex-shrink:0}
.fb{width:34px;height:34px;border-radius:7px;border:1px solid #252C45;background:transparent;color:#3E4870;font-size:23px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .1s,border-color .1s,color .1s}
.fb:active{opacity:.7}
.fr.ap .fb.fbp{background:#2DD4A0;border-color:#2DD4A0;color:#0B0E1A}
.fr.an .fb.fbn{background:#F06969;border-color:#F06969;color:#0B0E1A}

/* ── GATE SECTIONS ────────────────────────────────────────────── */
.gate{background:#13172A;border:1px solid #252C45;border-radius:13px;margin-bottom:8px;overflow:hidden}
.gate-head{display:flex;align-items:center;justify-content:space-between;padding:11px 10px 11px 14px;gap:8px}
.gate-q{font-size:17px;color:#C8D0E8;flex:1;line-height:1.35}
.gate-btns{display:flex;gap:5px;flex-shrink:0}
.gbtn{padding:5px 13px;border-radius:7px;border:1px solid #252C45;background:transparent;color:#8892B0;font-size:16px;font-weight:600}
.gbtn.gy{border-color:#2DD4A0;color:#2DD4A0;background:rgba(45,212,160,.08)}
.gbtn.gn{border-color:#3E4870;color:#E6EAF5;background:#1A1F35}
.gate-body{display:none;padding:0 8px 8px}
.gate-body.open{display:block}

/* ── SUB-GATE ─────────────────────────────────────────────────── */
.sg{background:#1A1F35;border:1px solid #252C45;border-radius:10px;margin-bottom:8px;overflow:hidden}
.sg-head{display:flex;align-items:center;justify-content:space-between;padding:9px 8px 9px 12px;gap:8px}
.sg-q{font-size:16px;color:#A8B2CC;flex:1;line-height:1.3}
.sg-body{display:none;padding:0 4px 6px}
.sg-body.open{display:block}
.grp-sublbl{font-size:13px;font-weight:600;letter-spacing:.5px;color:#5A6285;text-transform:uppercase;margin:8px 0 5px 4px}

/* ── CTA ──────────────────────────────────────────────────────── */
.cta-wrap{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;padding:10px 12px 20px;background:linear-gradient(to top,#0B0E1A 60%,transparent);pointer-events:none}
.cta-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4D7EF7,#3B6AE8);border:none;border-radius:12px;color:#fff;font-size:20px;font-weight:700;letter-spacing:.2px;pointer-events:all}
.cta-btn:active{opacity:.85}
.cta-back-btn{width:100%;padding:10px;background:transparent;border:1px solid #252C45;border-radius:12px;color:#6B7599;font-size:16px;font-weight:600;pointer-events:all;margin-top:6px}
.cta-back-btn:active{opacity:.7}

/* ── ENTRY MODEL TABS ─────────────────────────────────────────── */
.model-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.mtab{padding:7px 12px;background:#13172A;border:1px solid #252C45;border-radius:8px;color:#4D5880;font-size:16px;font-weight:600}
.mtab.active{background:rgba(77,126,247,.15);border-color:#4D7EF7;color:#4D7EF7}

/* ── RESULTS ──────────────────────────────────────────────────── */
.res-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.res-card{background:#13172A;border:1px solid #252C45;border-radius:14px;padding:18px 20px}
.res-card-lbl{font-size:14px;font-weight:600;letter-spacing:.6px;color:#4D5880;text-transform:uppercase;margin-bottom:6px}
.res-card-val{font-size:55px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1}
.res-card-val.green{color:#2DD4A0}
.res-card-val.amber{color:#F5A623}
.res-card-val.red{color:#F06969}
.res-card-val.dim{color:#3E4870}
.res-card-meta{font-size:16px;color:#4D5880;margin-top:6px}
.res-actions{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.res-btn{padding:13px;border-radius:11px;border:1px solid #252C45;background:#13172A;color:#E6EAF5;font-size:18px;font-weight:600}
.res-btn.primary{background:linear-gradient(135deg,#4D7EF7,#3B6AE8);border-color:transparent;color:#fff}
.res-btn:active{opacity:.8}

/* ── SCROLLBAR ────────────────────────────────────────────────── */
.scroll-body::-webkit-scrollbar{width:3px}
.scroll-body::-webkit-scrollbar-track{background:transparent}
.scroll-body::-webkit-scrollbar-thumb{background:#252C45;border-radius:2px}

/* ── OUTCOME SECTION (inside report modal) ───────────────────── */
.outcome-section{border-top:1px solid #1A1F35;margin-top:4px;padding-top:12px;display:flex;flex-direction:column;gap:8px}
.outcome-title{font-size:11px;font-weight:700;letter-spacing:.6px;color:#4D5880;text-transform:uppercase}
.outcome-btns{display:flex;gap:6px}
.obtn{flex:1;padding:12px 8px;border-radius:10px;border:1px solid #252C45;background:#13172A;color:#E6EAF5;font-size:16px;font-weight:700;text-align:center;cursor:pointer;font-family:inherit}
.obtn:active{opacity:.8}
.obtn.win{background:linear-gradient(135deg,#2DD4A0,#1BAF82);border-color:transparent;color:#0B0E1A}
.obtn.loss{background:linear-gradient(135deg,#F06969,#CC4C4C);border-color:transparent;color:#fff}
.obtn.correct{background:linear-gradient(135deg,#2DD4A0,#1BAF82);border-color:transparent;color:#0B0E1A}
.obtn.wrong{background:linear-gradient(135deg,#F06969,#CC4C4C);border-color:transparent;color:#fff}
.obtn.skip{background:transparent;border-color:#1A1F35;color:#4D5880;font-size:13px;font-weight:600;padding:8px}
.outcome-confirm{font-size:14px;font-weight:600;padding:12px 14px;border-radius:9px;text-align:center}
.outcome-confirm.opos{background:rgba(45,212,160,.1);color:#2DD4A0;border:1px solid rgba(45,212,160,.2)}
.outcome-confirm.oneg{background:rgba(240,105,105,.1);color:#F06969;border:1px solid rgba(240,105,105,.2)}
.outcome-confirm.ontr{background:#13172A;color:#4D5880;border:1px solid #1A1F35}

/* ── SHADOW REVIEW SCREEN ─────────────────────────────────────── */
.shadow-inst-tabs{display:flex;gap:5px;margin-bottom:10px}
.shadow-itab{flex:1;padding:8px;border-radius:9px;border:1px solid #252C45;background:#13172A;color:#4D5880;font-size:15px;font-weight:700;text-align:center;cursor:pointer;font-family:inherit}
.shadow-itab.active{background:rgba(77,126,247,.15);border-color:#4D7EF7;color:#4D7EF7}
.shadow-stat{background:#13172A;border:1px solid #252C45;border-radius:12px;padding:14px 16px;margin-bottom:10px}
.shadow-stat-row{display:flex;gap:20px;flex-wrap:wrap;row-gap:10px}
.shadow-stat-item{display:flex;flex-direction:column;gap:2px}
.shadow-stat-lbl{font-size:11px;font-weight:700;letter-spacing:.6px;color:#4D5880;text-transform:uppercase}
.shadow-stat-val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;color:#E6EAF5}
.shadow-tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid #252C45}
.shadow-table{width:100%;border-collapse:collapse;font-size:13px}
.shadow-table th{font-size:11px;font-weight:700;letter-spacing:.5px;color:#4D5880;text-transform:uppercase;text-align:left;padding:8px 10px;border-bottom:1px solid #1A1F35;background:#13172A}
.shadow-table td{padding:8px 10px;border-bottom:1px solid #0F1220;color:#C8D0E8;font-family:ui-monospace,monospace;font-size:13px}
.shadow-table td:first-child{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#E6EAF5;font-size:14px}
.shadow-table tr:last-child td{border-bottom:none}
.drift-pos{color:#2DD4A0;font-weight:700}
.drift-neg{color:#F06969;font-weight:700}
.drift-zero{color:#2E3655}
.shadow-empty{font-size:15px;color:#2E3655;padding:32px 4px;text-align:center;line-height:1.6}

/* ── SYNC + REPORT ───────────────────────────────────────────────── */
.sync-badge{font-size:11px;color:#2DD4A0;letter-spacing:.3px;padding:5px 12px;background:rgba(45,212,160,.08);border:1px solid rgba(45,212,160,.2);border-radius:8px;margin-bottom:8px;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(11,14,26,.92);z-index:200;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:16px}
.modal-box{background:#13172A;border:1px solid #252C45;border-radius:16px;padding:20px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:10px;margin:auto}
.modal-title{font-size:15px;font-weight:700;color:#E6EAF5}
.report-pre{background:#0B0E1A;border:1px solid #1A1F35;border-radius:10px;padding:14px;font-size:11px;font-family:ui-monospace,monospace;color:#9DA8C7;overflow-x:auto;white-space:pre;line-height:1.5;max-height:50vh;overflow-y:auto}
.report-hdr-btn{background:rgba(77,126,247,.12);border:1px solid #4D7EF7;border-radius:8px;color:#4D7EF7;font-size:13px;font-weight:700;padding:5px 10px;flex-shrink:0}
.report-hdr-btn:active{opacity:.7}
.gate-sel{background:#13172A;border:1px solid #252C45;border-radius:7px;color:#8892B0;font-size:15px;font-weight:600;padding:6px 12px;appearance:none;-webkit-appearance:none;cursor:pointer;min-width:100px}
.gate-sel.gy{border-color:#2DD4A0;color:#2DD4A0;background:rgba(45,212,160,.08)}
.gate-sel.gn{border-color:#3E4870;color:#E6EAF5;background:#1A1F35}
.fr-warn{border-color:#F5A623!important;background:rgba(245,166,35,.06)!important}
.warn-banner{background:rgba(245,166,35,.15);border:1px solid #F5A623;border-radius:8px;color:#F5A623;font-size:13px;padding:8px 12px;margin-bottom:4px;line-height:1.5}
</style>
</head>

let _syncTimer = null;
let _sseSource = null;
let _lastReportTs = 0;
let _remoteMode = false;

function syncEnabled() { return !!(FB_URL && FB_SECRET); }
function fbPath(inst) { return FB_URL + '/latest/' + inst + '.json?auth=' + FB_SECRET; }

function pushState() {
  if (!syncEnabled() || !S.inst) return;
  const body = JSON.stringify({
    inst:S.inst, step:S.step, fac:S.fac, gates:S.gates, model:S.model,
    report:S._report||null, deviceId:DEVICE_ID, ts:Date.now()
  });
  fetch(fbPath(S.inst), {method:'PUT', body:body, headers:{'Content-Type':'application/json'}}).catch(function(){});
}

function schedulePush() {
  if (!syncEnabled()) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(pushState, 600);
}

function applyRemoteState(snap) {
  if (!snap || snap.deviceId === DEVICE_ID) return;
  S.inst = snap.inst; S.step = snap.step;
  S.fac = snap.fac || {}; S.gates = snap.gates || {};
  S.model = snap.model || null; S._report = snap.report || null;
  _remoteMode = true;
  render();
  if (snap.report && snap.report.ts > _lastReportTs) {
    _lastReportTs = snap.report.ts;
    showReportModal(snap.report.markdown);
  }
}

function startSSE(inst) {
  if (!syncEnabled()) return;
  if (_sseSource) { _sseSource.close(); _sseSource = null; }
  var es = new EventSource(fbPath(inst));
  es.addEventListener('put',   function(e) { try { applyRemoteState(JSON.parse(e.data).data); } catch(x){} });
  es.addEventListener('patch', function(e) { try { applyRemoteState(JSON.parse(e.data).data); } catch(x){} });
  _sseSource = es;
}

function stopSSE() {
  if (_sseSource) { _sseSource.close(); _sseSource = null; }
  _remoteMode = false;
}

function getCachedShadow(inst) {
  try { return Object.assign({}, _SW_DEFAULT, JSON.parse(localStorage.getItem('tm_sw_' + inst))); }
  catch(e) { return Object.assign({}, _SW_DEFAULT); }
}
function setCachedShadow(inst, data) {
  localStorage.setItem('tm_sw_' + inst, JSON.stringify(data));
}
function getShadowWeights(inst) { return getCachedShadow(inst).weights || {}; }

async function pushShadowJSON(inst, data) {
  if (!ghEnabled()) return;
  var apiUrl = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/data/shadow_' + inst + '.json';
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  var sha = null;
  try {
    var r = await fetch(apiUrl, { headers:{ Authorization:'token ' + GH_TOKEN } });
    if (r.ok) { sha = (await r.json()).sha; }
  } catch(e) {}
  var body = { message:'shadow weights update (' + inst + ')', content: content };
  if (sha) body.sha = sha;
  fetch(apiUrl, {
    method: 'PUT',
    headers: { Authorization:'token ' + GH_TOKEN, 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  }).catch(function(){});
}

function pushShadowMarkdown(inst, filename, md) {
  if (!ghEnabled()) return;
  var apiUrl = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/shadow-log/' + inst + '/' + filename;
  var content = btoa(unescape(encodeURIComponent(md)));
  fetch(apiUrl, {
    method: 'PUT',
    headers: { Authorization:'token ' + GH_TOKEN, 'Content-Type':'application/json' },
    body: JSON.stringify({ message:'shadow log entry (' + inst + ')', content: content })
  }).catch(function(){});
}

    var apiUrl = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/data/shadow_' + inst + '.json';
    var r = await fetch(apiUrl, { headers:{ Authorization:'token ' + GH_TOKEN } });
    if (r.ok) {
      var j = await r.json();
      var data = JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))));
      setCachedShadow(inst, Object.assign({}, _SW_DEFAULT, data));
    }
  } catch(e) {}
}

// ─── SHADOW LEARNING — UTILITIES ─────────────────────────────────────────────
function buildBaseMap(inst) {
  var map = {};
  function idx(items, tf) {
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      if (item.type === 'factor') map[item.id] = { weight: item.weight, label: item.label, tf: tf };
      else if (item.type === 'nested-gate') idx(item.items, tf);
      else if (item.type === 'gate-factor') map[item.id] = { weight: item.weight, label: item.question, tf: tf };
    }
  }
  var d = DATA[inst];
  var tfs = ['daily','h4','h1'];
  for (var s = 0; s < tfs.length; s++) {
    var sec = d.sections[tfs[s]];
    var tf = sec.label;
    for (var a = 0; a < sec.always.length; a++) {
      map[sec.always[a].id] = { weight: sec.always[a].weight, label: sec.always[a].label, tf: tf };
    }
    for (var g = 0; g < sec.gates.length; g++) { idx(sec.gates[g].items, tf); }
  }
  var models = Object.keys(d.entry);
  for (var m = 0; m < models.length; m++) {
    var arr = d.entry[models[m]];
    for (var e = 0; e < arr.length; e++) {
      var fi = arr[e];
      if (fi.type === 'gate-factor') map[fi.id] = { weight: fi.weight, label: fi.question, tf: 'Entry' };
      else map[fi.id] = { weight: fi.weight, label: fi.label, tf: 'Entry' };
    }
  }
  return map;
}

function hasEntryFactors(inst, facSnap) {
  var entryIds = {};
  var models = Object.keys(DATA[inst].entry);
  for (var m = 0; m < models.length; m++) {
    var arr = DATA[inst].entry[models[m]];
    for (var i = 0; i < arr.length; i++) entryIds[arr[i].id] = true;
  }
  var ids = Object.keys(facSnap);
  for (var k = 0; k < ids.length; k++) {
    if (facSnap[ids[k]] && entryIds[ids[k]]) return true;
  }
  return false;
}

function makeShadowFilename(result, type, num) {
  var now = new Date();
  var ymd = now.toISOString().slice(0,10);
  var hm = now.toTimeString().slice(0,5).replace(':','');
  var typeTag = type === 'trade' ? 'trade' : 'read';
  return ymd + '-' + hm + '-' + result + '-' + typeTag + num + '.md';
}

function buildShadowMarkdown(inst, result, type, adjustments, stats) {
  var instName = DATA[inst].name;
  var now = new Date();
  var dateStr = now.toISOString().slice(0,10);
  var timeStr = now.toTimeString().slice(0,5);
  var isTrade = type === 'trade';
  var num = isTrade ? stats.tradeCount : stats.readCount;
  var resultLabel = result === 'win' ? 'WIN' : result === 'loss' ? 'LOSS' : result === 'correct' ? 'BIAS CORRECT' : 'BIAS WRONG';
  var lines = [
    '## ' + instName + ' · ' + resultLabel + ' · ' + (isTrade ? 'Trade' : 'Read') + ' #' + num + ' · ' + dateStr + ' ' + timeStr,
    '', '| Factor | Dir | Old Weight | New Weight | Change |', '|---|---|---|---|---|'
  ];
  for (var i = 0; i < adjustments.length; i++) {
    var adj = adjustments[i];
    var dir = adj.dir === 'pos' ? '+' : '−';
    var pct = ((adj.newW / adj.oldW - 1) * 100).toFixed(1);
    lines.push('| ' + adj.label + ' | ' + dir + ' | ' + adj.oldW.toFixed(4) + ' | ' + adj.newW.toFixed(4) + ' | ' + (pct > 0 ? '+' : '') + pct + '% |');
  }
  lines.push('');
  lines.push('**Stats:** Trades ' + stats.tradeCount + ' (' + stats.wins + 'W/' + stats.losses + 'L) · Reads ' + stats.readCount + ' (' + stats.correct + '✓/' + stats.wrong + '✗)');
  return lines.join('\n');
}

// ─── SHADOW LEARNING — CORE ───────────────────────────────────────────────────
function applyOutcome(result, type) {
  if (!S._report || S._report.outcomeRecorded) return null;
  var inst = S.inst;
  var snap = S._report.facSnapshot || {};
  var baseMap = buildBaseMap(inst);
  var cached = getCachedShadow(inst);
  var sw = Object.assign({}, cached.weights || {});
  var adjustments = [];
  var ids = Object.keys(snap);
  for (var k = 0; k < ids.length; k++) {
    var id = ids[k];
    var dir = snap[id];
    if (!dir || !baseMap[id]) continue;
    var oldW = sw[id] !== undefined ? sw[id] : baseMap[id].weight;
    var boost = (result === 'win' || result === 'correct');
    var mult = boost ? (dir === 'pos' ? 1.05 : 0.95) : (dir === 'pos' ? 0.95 : 1.05);
    var newW = Math.round(oldW * mult * 1e6) / 1e6;
    sw[id] = newW;
    adjustments.push({ id: id, label: baseMap[id].label, dir: dir, oldW: oldW, newW: newW });
  }
  if (!adjustments.length) return null;
  var isTrade = type === 'trade';
  var newData = {
    weights:    sw,
    tradeCount: (cached.tradeCount || 0) + (isTrade ? 1 : 0),
    wins:       (cached.wins || 0)       + (isTrade && result === 'win'     ? 1 : 0),
    losses:     (cached.losses || 0)     + (isTrade && result === 'loss'    ? 1 : 0),
    readCount:  (cached.readCount || 0)  + (!isTrade ? 1 : 0),
    correct:    (cached.correct || 0)    + (!isTrade && result === 'correct' ? 1 : 0),
    wrong:      (cached.wrong || 0)      + (!isTrade && result === 'wrong'   ? 1 : 0),
    lastUpdated: new Date().toISOString(),
    lastEntry: { result: result, type: type, adjustments: adjustments }
  };
  setCachedShadow(inst, newData);
  if (ghEnabled()) {
    pushShadowJSON(inst, newData);
    var num = isTrade ? newData.tradeCount : newData.readCount;
    pushShadowMarkdown(inst, makeShadowFilename(result, type, num), buildShadowMarkdown(inst, result, type, adjustments, newData));
  }
  S._report.outcomeRecorded = true;
  return { count: adjustments.length, type: type, result: result, newData: newData };
}

function recordOutcome(result, type) {
  var out = applyOutcome(result, type);
  var sec = document.getElementById('outcome-section');
  if (!sec) return;
  var isTrade = type === 'trade';
  var isPos = result === 'win' || result === 'correct';
  var label = result === 'win' ? '✓ WIN' : result === 'loss' ? '✗ LOSS' : result === 'correct' ? '✓ BIAS CORRECT' : '✗ BIAS WRONG';
  var num = out ? (isTrade ? out.newData.tradeCount : out.newData.readCount) : 0;
  var noun = isTrade ? 'Trade' : 'Read';
  var cnt = out ? out.count : 0;
  sec.innerHTML = '<div class="outcome-confirm ' + (isPos ? 'opos' : 'oneg') + '">' +
    label + ' recorded — ' + cnt + ' factor' + (cnt !== 1 ? 's' : '') + ' updated (' + noun + ' #' + num + ')' +
    '</div>';
}

function skipOutcome() {
  var sec = document.getElementById('outcome-section');
  if (sec) sec.innerHTML = '<div class="outcome-confirm ontr">Skipped — no weights updated</div>';
  if (S._report) S._report.outcomeRecorded = true;
}

// ─── CALCULATION ───────────────────────────────────────────────────────────
function collectItems(items, acc) {
  for (const item of items) {
    if (item.type === 'factor') {
      const d = S.fac[item.id];
      if (d) acc.push({ w:item.weight, d });
    } else if (item.type === 'nested-gate') {
      if (S.gates[item.id] === true) collectItems(item.items, acc);
    } else if (item.type === 'gate-factor') {
      const d = S.fac[item.id];
      if (d === 'neg') acc.push({ w:item.weight, d:'neg' });
      if (S.gates[item.id] === true) collectItems(item.items, acc);
    }
  }
}

function collectAll(inclEntry) {
  if (!S.inst) return [];
  const data = DATA[S.inst];
  const acc = [];
  for (const sk of ['daily','h4','h1']) {
    const sec = data.sections[sk];
    for (const fitem of sec.always) {
      const d = S.fac[fitem.id];
      if (d) acc.push({ w:fitem.weight, d });
    }
    for (const gate of sec.gates) {
      if (S.gates[gate.id] === true) collectItems(gate.items, acc);
    }
  }
  if (inclEntry && S.model) {
    const ef = data.entry[S.model] || [];
    for (const fitem of ef) {
      if (fitem.type === 'gate-factor') {
        const d = S.fac[fitem.id];
        if (d === 'neg') acc.push({ w:fitem.weight, d });   // only No applies gate weight
        if (S.gates[fitem.id] === true) collectItems(fitem.items, acc);
      } else {
        const d = S.fac[fitem.id];
        if (d) acc.push({ w:fitem.weight, d });
      }
    }
  }
  return acc;
}

function calcP(arr) {
  if (!arr.length) return null;
  const pos = arr.filter(x=>x.d==='pos').reduce((s,x)=>s+x.w,0);
  const neg = arr.filter(x=>x.d==='neg').reduce((s,x)=>s+x.w,0);
  return (pos - 0.5*neg) / arr.length;
}

function getProbs() {
  const conf = collectAll(false);
  const all  = collectAll(true);
  return {
    dir: calcP(conf), dirN: conf.length,
    trd: calcP(all),  trdN: all.length,
  };
}

function pColor(inst, v) {
  if (v === null) return '';
  const threshold = inst === 'xau' ? 0.50 : 0.57;
  return v >= threshold ? 'green' : 'red';
}

function pFmt(v) {
  return v === null ? '—' : (v * 100).toFixed(1) + '%';
}

function pThreshold(inst) {
  return inst === 'xau' ? '50%' : '57%';
}

// ─── RENDERING ─────────────────────────────────────────────────────────────
function frCls(depth, dir) {
  let c = 'fr';
  if (depth === 1) c += ' n1';
  if (depth === 2) c += ' n2';
  if (dir === 'pos') c += ' ap';
  else if (dir === 'neg') c += ' an';
  return c;
}

function renderFR(fitem, depth) {
  const d = S.fac[fitem.id] || null;
  const isMandatory = depth === 0 && !d && ['Swing','Internal','Fractal'].includes(fitem.label);
  return `<div id="fr_${fitem.id}" class="${frCls(depth,d)}${isMandatory?' fr-warn':''}" data-d="${depth}" data-lbl="${fitem.label}">
    <span class="fr-name">${fitem.label}</span>
    <span class="fr-wt">${fitem.weight.toFixed(3)}</span>
    <div class="fr-btns">
      <button class="fb fbp" onclick="sf('${fitem.id}','pos',${fitem.weight})">+</button>
      <button class="fb fbn" onclick="sf('${fitem.id}','neg',${fitem.weight})">−</button>
    </div>
  </div>`;
}

function renderGateFactor(item) {
  const open = S.gates[item.id] === true;
  const d = S.fac[item.id];
  const yn = d === 'pos' ? true : d === 'neg' ? false : undefined;
  return `<div class="gate">
    <div class="gate-head">
      <div class="gate-q">${item.question}</div>
      <div class="gate-btns">
        <button class="gbtn${yn===true?' gy':''}" onclick="sgf('${item.id}',true)">Yes</button>
        <button class="gbtn${yn===false?' gn':''}" onclick="sgf('${item.id}',false)">No</button>
      </div>
    </div>
    <div id="gfb_${item.id}" class="gate-body${open?' open':''}">
      ${open ? renderItems(item.items, 1) : ''}
    </div>
  </div>`;
}

function renderItems(items, depth) {
  let h = '';
  for (const item of items) {
    if (item.type === 'factor') {
      h += renderFR(item, depth);
    } else if (item.type === 'nested-gate') {
      const open = S.gates[item.id] === true;
      const yn = S.gates[item.id];
      h += `<div class="sg">
        <div class="sg-head">
          <div class="sg-q">${item.question}</div>
          <div class="gate-btns">
            <button class="gbtn${yn===true?' gy':''}" onclick="ssg('${item.id}',true)">Yes</button>
            <button class="gbtn${yn===false?' gn':''}" onclick="ssg('${item.id}',false)">No</button>
          </div>
        </div>
        <div id="sgb_${item.id}" class="sg-body${open?' open':''}">
          ${open ? renderItems(item.items, depth+1) : ''}
        </div>
      </div>`;
    } else if (item.type === 'gate-factor') {
      h += renderGateFactor(item);
    } else if (item.type === 'label') {
      h += `<div class="grp-sublbl">${item.text}</div>`;
    }
  }
  return h;
}

function renderGates(gates) {
  let h = '';
  for (const gate of gates) {
    const open = S.gates[gate.id] === true;
    const yn = S.gates[gate.id];
    h += `<div class="gate">
      <div class="gate-head">
        <div class="gate-q">${gate.question}</div>
        <select class="gate-sel${yn===true?' gy':yn===false?' gn':''}" onchange="sgSel('${gate.id}',this.value)">
          <option value=""${yn===undefined?' selected':''}>— Select —</option>
          <option value="yes"${yn===true?' selected':''}>Yes</option>
          <option value="no"${yn===false?' selected':''}>No</option>
        </select>
      </div>
      <div id="gb_${gate.id}" class="gate-body${open?' open':''}">
        ${open ? renderItems(gate.items, 1) : ''}
      </div>
    </div>`;
  }
  return h;
}

function hasAnyFactor(step) {
  if (!S.inst) return false;
  const d = DATA[S.inst];
  if (['daily','h4','h1'].includes(step)) {
    const sec = d.sections[step];
    if (sec.always.some(fi => S.fac[fi.id])) return true;
    if (sec.gates.some(g => S.gates[g.id] !== undefined)) return true;
    return false;
  }
  if (step === 'entry') return !!(S.model || Object.values(d.entry).flat().some(fi => S.fac[fi.id]));
  return false;
}

function stepState(step) {
  if (S.step === step) return 'active';
  return hasAnyFactor(step) ? 'done' : 'nav';
}

  const d = S.fac[id] || null;

function updateChips() {
  const p = getProbs();
  const pd = document.getElementById('pdir');
  const pt = document.getElementById('ptrd');
  if (pd) { pd.textContent = pFmt(p.dir); pd.className = 'prob-chip-val ' + pColor(S.inst, p.dir); }
  if (pt) { pt.textContent = pFmt(p.trd); pt.className = 'prob-chip-val ' + pColor(S.inst, p.trd); }
}

// ─── ACTIONS ───────────────────────────────────────────────────────────────
function sf(id, dir, w) {
  S.fac[id] = S.fac[id] === dir ? null : dir;
  updateRow(id);
  updateChips();
  schedulePush();
}

function sg(id, val) {
  S.gates[id] = val;
  const body = document.getElementById('gb_' + id);
  const head = body && body.previousElementSibling;
  if (body) {
    body.className = 'gate-body' + (val ? ' open' : '');
    if (val && !body.innerHTML.trim()) {
      const gate = findGate(id);
      if (gate) body.innerHTML = renderItems(gate.items, 1);
    }
  }
  if (head) {
    const sel = head.querySelector('.gate-sel');
    if (sel) sel.className = 'gate-sel' + (val === true ? ' gy' : val === false ? ' gn' : '');
  }
  updateChips();
  schedulePush();
}

function sgSel(id, val) {
  if (val === 'yes') sg(id, true);
  else if (val === 'no') sg(id, false);
  else { delete S.gates[id]; render(); }
}

function ssg(id, val) {
  S.gates[id] = val;
  const body = document.getElementById('sgb_' + id);
  const head = body && body.previousElementSibling;
  if (body) {
    body.className = 'sg-body' + (val ? ' open' : '');
    if (val && !body.innerHTML.trim()) {
      const sg = findSubGate(id);
      if (sg) body.innerHTML = renderItems(sg.items, 2);
    }
  }
  if (head) {
    const btns = head.querySelectorAll('.gbtn');
    if (btns[0]) btns[0].className = 'gbtn' + (val === true ? ' gy' : '');
    if (btns[1]) btns[1].className = 'gbtn' + (val === false ? ' gn' : '');
  }
  updateChips();
  schedulePush();
}

function sgf(id, val) {
  S.fac[id] = val ? 'pos' : 'neg';
  S.gates[id] = val;
  const body = document.getElementById('gfb_' + id);
  const head = body && body.previousElementSibling;
  if (body) {
    body.className = 'gate-body' + (val ? ' open' : '');
    if (val && !body.innerHTML.trim()) {
      const item = findGateFactor(id);
      if (item) body.innerHTML = renderItems(item.items, 1);
    }
  }
  if (head) {
    const btns = head.querySelectorAll('.gbtn');
    if (btns[0]) btns[0].className = 'gbtn' + (val === true ? ' gy' : '');
    if (btns[1]) btns[1].className = 'gbtn' + (val === false ? ' gn' : '');
  }
  updateChips();
  schedulePush();
}

function _findGF(items, id) {
  for (const item of items) {
    if (item.type === 'gate-factor' && item.id === id) return item;
    if (item.items) { const r = _findGF(item.items, id); if (r) return r; }
  }
  return null;
}

function findGateFactor(id) {
  if (!S.inst) return null;
  const d = DATA[S.inst];
  for (const model of Object.values(d.entry)) {
    for (const item of model) {
      if (item.type === 'gate-factor' && item.id === id) return item;
    }
  }
  for (const sec of Object.values(d.sections)) {
    for (const gate of sec.gates) {
      const found = _findGF(gate.items, id);
      if (found) return found;
    }
  }
  return null;
}

function findGate(id) {
  if (!S.inst) return null;
  const data = DATA[S.inst];
  for (const sk of ['daily','h4','h1']) {
    for (const g of data.sections[sk].gates) {
      if (g.id === id) return g;
    }
  }
  return null;
}

function findSubGate(id) {
  if (!S.inst) return null;
  const data = DATA[S.inst];
  for (const sk of ['daily','h4','h1']) {
    for (const g of data.sections[sk].gates) {
      for (const item of g.items) {
        if (item.type === 'nested-gate' && item.id === id) return item;
      }
    }
  }
  return null;
}

function selM(model) {
  S.model = model;
  render();
  schedulePush();
}

function nav(step) {
  S.step = step;
  render();
  schedulePush();
}

function startInst(inst) {
  S.inst = inst;
  S.step = 'daily';
  S.fac = {};
  S.gates = {};
  S.model = null;
  S._report = null;
  _remoteMode = false;
  render();
  startSSE(inst);
}

function goHome() {
  S.step = 'home';
  localStorage.removeItem('tm_state');
  render();
  stopSSE();
}

function restart() {
  const inst = S.inst;
  S.fac = {};
  S.gates = {};
  S.model = null;
  S._report = null;
  S.step = 'daily';
  _remoteMode = false;
  render();
  schedulePush();
}

// ─── VALIDATION ──────────────────────────────────────────────────────────────
function getValidationWarnings() {
  if (!S.inst) return [];
  var warns = [];
  var d = DATA[S.inst];
  var pairs = [['daily','Daily'],['h4','4H'],['h1','H1']];
  for (var p = 0; p < pairs.length; p++) {
    var sk = pairs[p][0], tf = pairs[p][1];
    var sec = d.sections[sk];
    var mandatoryNames = ['Swing','Internal','Fractal'];
    for (var mn = 0; mn < mandatoryNames.length; mn++) {
      var fi = null;
      for (var a = 0; a < sec.always.length; a++) { if (sec.always[a].label === mandatoryNames[mn]) { fi = sec.always[a]; break; } }
      if (fi && !S.fac[fi.id]) warns.push(tf + ' ' + mandatoryNames[mn] + ' not marked');
    }
    var mobGate = null, obtGate = null, lsGate = null;
    for (var g = 0; g < sec.gates.length; g++) {
      if (sec.gates[g].question === 'Mitigation OB') mobGate = sec.gates[g];
      if (sec.gates[g].question === 'OB Target') obtGate = sec.gates[g];
      if (sec.gates[g].question === 'Swept Liquidity') lsGate = sec.gates[g];
    }
    if (mobGate && obtGate) {
      var mobOpen = S.gates[mobGate.id] === true;
      var obtOpen = S.gates[obtGate.id] === true;
      if (mobOpen && !obtOpen) warns.push(tf + ': Mitigation OB selected, OB Target missing');
      if (obtOpen && !mobOpen) warns.push(tf + ': OB Target selected, Mitigation OB missing');
    }
    if (lsGate && S.gates[lsGate.id] === true) {
      var hasAny = false;
      for (var li = 0; li < lsGate.items.length; li++) {
        var it = lsGate.items[li];
        if ((it.type === 'factor' && S.fac[it.id]) || (it.type === 'nested-gate' && S.gates[it.id] === true)) { hasAny = true; break; }
      }
      if (!hasAny) warns.push(tf + ': Swept Liquidity open but no factors marked');
    }
  }
  return warns;
}

// ─── REPORT ──────────────────────────────────────────────────────────────────
function buildReportMarkdown() {
  var p = getProbs();
  var instName = DATA[S.inst].name;
  var date = new Date().toISOString().slice(0,10);
  function yn(d) { return d === 'pos' ? 'Yes' : d === 'neg' ? 'No' : null; }
  var thr = S.inst === 'xau' ? 0.50 : 0.57;
  function sigStr(v) { return v===null ? '—' : v>=thr ? '🟢 STRONG' : '🔴 WEAK'; }
  var IND = '    ';

  var lines = ['## ' + instName + ' — ' + date, ''];
  lines.push('| Confluence Factor | Factor Support | Weight |');
  lines.push('|---|---|---|');

  ['daily','h4','h1'].forEach(function(sk) {
    var sec = DATA[S.inst].sections[sk];
    var tf = sec.label;
    sec.always.forEach(function(fi) {
      var d = S.fac[fi.id];
      if (d) lines.push('| ' + tf + ' ' + fi.label + ' | ' + yn(d) + ' | ' + fi.weight.toFixed(4) + ' |');
    });
    sec.gates.forEach(function(gate) {
      if (S.gates[gate.id] !== true) return;
      gate.items.forEach(function(item) {
        if (item.type === 'label') return;
        if (item.type === 'factor') {
          var d = S.fac[item.id];
          if (d) lines.push('| ' + tf + ' ' + gate.question + ' - ' + item.label + ' | ' + yn(d) + ' | ' + item.weight.toFixed(4) + ' |');
        } else if (item.type === 'nested-gate') {
          if (S.gates[item.id] !== true) return;
          item.items.forEach(function(sub) {
            if (sub.type !== 'factor') return;
            var d = S.fac[sub.id];
            if (d) lines.push('| ' + IND + item.question + ' - ' + sub.label + ' | ' + yn(d) + ' | ' + sub.weight.toFixed(4) + ' |');
          });
        } else if (item.type === 'gate-factor') {
          var gfd = S.fac[item.id];
          if (gfd === 'neg') lines.push('| ' + tf + ' ' + gate.question + ' - ' + item.question + ' | No | ' + item.weight.toFixed(4) + ' |');
          if (S.gates[item.id] === true) {
            item.items.forEach(function(sub) {
              if (sub.type !== 'factor') return;
              var ds = S.fac[sub.id];
              if (ds) lines.push('| ' + IND + item.question + ' - ' + sub.label + ' | ' + yn(ds) + ' | ' + sub.weight.toFixed(4) + ' |');
            });
          }
        }
      });
    });
  });

  if (S.model && DATA[S.inst].entry[S.model]) {
    lines.push('| **Entry: ' + S.model + '** | — | — |');
    DATA[S.inst].entry[S.model].forEach(function(fi) {
      if (fi.type === 'gate-factor') {
        var d = S.fac[fi.id];
        if (d === 'neg') lines.push('| ' + fi.question + ' | No | ' + fi.weight.toFixed(4) + ' |');
        if (S.gates[fi.id] === true) {
          fi.items.forEach(function(sub) {
            if (sub.type !== 'factor') return;
            var ds = S.fac[sub.id];
            if (ds) lines.push('| ' + IND + sub.label + ' | ' + yn(ds) + ' | ' + sub.weight.toFixed(4) + ' |');
          });
        }
      } else {
        var d = S.fac[fi.id];
        if (d) lines.push('| ' + fi.label + ' | ' + yn(d) + ' | ' + fi.weight.toFixed(4) + ' |');
      }
    });
  }

  lines.push('');
  lines.push('| Metric | Value | Signal |');
  lines.push('|--------|-------|--------|');
  lines.push('| DIR Probability | ' + pFmt(p.dir) + ' | ' + sigStr(p.dir) + ' |');
  lines.push('| TRADE Probability | ' + pFmt(p.trd) + ' | ' + sigStr(p.trd) + ' |');
  lines.push('| Confluence Factors | ' + p.dirN + ' | — |');
  lines.push('| Total Factors (w/ entry) | ' + p.trdN + ' | — |');
  return lines.join('\n');
}

function generateReport() {
  var md = buildReportMarkdown();
  S._report = {
    generated: true, ts: Date.now(), markdown: md,
    facSnapshot: Object.assign({}, S.fac),
    outcomeRecorded: false
  };
  localStorage.setItem('tm_report_' + S.inst, JSON.stringify(S._report));
  pushState();
  showReportModal(md);
}

function buildOutcomeSection() {
  if (!S._report || !S._report.facSnapshot || S._report.outcomeRecorded) return '';
  var snap = S._report.facSnapshot;
  var hasSnap = Object.keys(snap).some(function(k){ return !!snap[k]; });
  if (!hasSnap) return '';
  var isTrade = hasEntryFactors(S.inst, snap);
  if (isTrade) {
    return '<div id="outcome-section" class="outcome-section">' +
      '<div class="outcome-title">Trade Outcome</div>' +
      '<div class="outcome-btns">' +
        '<button class="obtn win" onclick="recordOutcome(\'win\',\'trade\')">WIN</button>' +
        '<button class="obtn loss" onclick="recordOutcome(\'loss\',\'trade\')">LOSS</button>' +
      '</div>' +
      '<button class="obtn skip" onclick="skipOutcome()">Skip — don\'t record</button>' +
    '</div>';
  } else {
    return '<div id="outcome-section" class="outcome-section">' +
      '<div class="outcome-title">Directional Outcome</div>' +
      '<div class="outcome-btns">' +
        '<button class="obtn correct" onclick="recordOutcome(\'correct\',\'directional\')">Bias Correct</button>' +
        '<button class="obtn wrong" onclick="recordOutcome(\'wrong\',\'directional\')">Bias Wrong</button>' +
      '</div>' +
      '<button class="obtn skip" onclick="skipOutcome()">Skip — don\'t record</button>' +
    '</div>';
  }
}

function showReportModal(md) {
  var existing = document.getElementById('report-modal');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.id = 'report-modal';
  el.className = 'modal-overlay';
  el.dataset.md = md;
  var warns = getValidationWarnings();
  var warnHtml = warns.length ? '<div class="warn-banner">⚠ ' + warns.join(' · ') + '</div>' : '';
  el.innerHTML =
    '<div class="modal-box">' +
    '<div class="modal-title">Analysis Report</div>' +
    warnHtml +
    '<pre class="report-pre">' + md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>' +
    '<button class="res-btn primary" id="copy-btn" onclick="copyReport()">Copy Report</button>' +
    '<button class="res-btn" onclick="closeModal()">Close</button>' +
    buildOutcomeSection() +
    '</div>';
  document.body.appendChild(el);
}

function copyReport() {
  var el = document.getElementById('report-modal');
  var md = el ? el.dataset.md : '';
  var btn = document.getElementById('copy-btn');
  function ok() { if (btn) { btn.textContent='✓ Copied!'; setTimeout(function(){ btn.textContent='Copy Report'; },1500); } }
  if (navigator.clipboard) { navigator.clipboard.writeText(md).then(ok).catch(function(){ fallbackCopy(md,ok); }); }
  else { fallbackCopy(md, ok); }
}

function fallbackCopy(text, cb) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch(x) {}
  document.body.removeChild(ta);
}

function closeModal() {
  var el = document.getElementById('report-modal');
  if (el) el.remove();
}

// ─── SHADOW REVIEW SCREEN ────────────────────────────────────────────────────
function renderShadow() {
  var si = S.shadowInst || 'eu';
  var cached = getCachedShadow(si);
  var sw = cached.weights || {};
  var baseMap = buildBaseMap(si);
  var adjusted = [];
  var swIds = Object.keys(sw);
  for (var k = 0; k < swIds.length; k++) {
    var id = swIds[k];
    if (!baseMap[id]) continue;
    var base = baseMap[id].weight;
    var shadow = sw[id];
    var drift = (shadow / base - 1) * 100;
    if (Math.abs(drift) < 0.001) continue;
    adjusted.push({ id: id, label: baseMap[id].label, tf: baseMap[id].tf, base: base, shadow: shadow, drift: drift });
  }
  adjusted.sort(function(a, b){ return Math.abs(b.drift) - Math.abs(a.drift); });
  var tc = cached.tradeCount || 0;
  var rc = cached.readCount || 0;
  var wr = tc > 0 ? Math.round((cached.wins || 0) / tc * 100) : null;
  var cr = rc > 0 ? Math.round((cached.correct || 0) / rc * 100) : null;
  var instTabsH = ['eu','xau'].map(function(i){
    return '<button class="shadow-itab' + (si === i ? ' active' : '') + '" onclick="setShadowInst(\'' + i + '\')">' + DATA[i].name + '</button>';
  }).join('');
  var statsH = '<div class="shadow-stat"><div class="shadow-stat-row">' +
    '<div class="shadow-stat-item"><div class="shadow-stat-lbl">Trades</div><div class="shadow-stat-val">' + tc + '</div></div>' +
    '<div class="shadow-stat-item"><div class="shadow-stat-lbl">W / L</div><div class="shadow-stat-val">' + (cached.wins||0) + 'W / ' + (cached.losses||0) + 'L' + (wr !== null ? ' · ' + wr + '%' : '') + '</div></div>' +
    '<div class="shadow-stat-item"><div class="shadow-stat-lbl">Reads</div><div class="shadow-stat-val">' + rc + '</div></div>' +
    (cr !== null ? '<div class="shadow-stat-item"><div class="shadow-stat-lbl">Correct</div><div class="shadow-stat-val">' + (cached.correct||0) + '/' + rc + ' · ' + cr + '%</div></div>' : '') +
    '</div></div>';
  var tableH;
  if (adjusted.length === 0) {
    tableH = '<div class="shadow-empty">No factors adjusted yet.<br>Record trade and directional outcomes to start learning.</div>';
  } else {
    var rows = adjusted.map(function(a){
      var driftCls = a.drift > 0 ? 'drift-pos' : 'drift-neg';
      var driftStr = (a.drift > 0 ? '+' : '') + a.drift.toFixed(1) + '%';
      return '<tr><td>' + a.tf + ' ' + a.label + '</td><td>' + a.base.toFixed(4) + '</td><td>' + a.shadow.toFixed(4) + '</td><td class="' + driftCls + '">' + driftStr + (a.drift > 0 ? ' ↑' : ' ↓') + '</td></tr>';
    }).join('');
    tableH = '<div class="shadow-tbl-wrap"><table class="shadow-table"><thead><tr><th>Factor</th><th>Base</th><th>Shadow</th><th>Drift</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
  }
  var last = cached.lastEntry;
  var revertLabel = last ? (last.result === 'win' ? 'WIN' : last.result === 'loss' ? 'LOSS' : last.result === 'correct' ? 'Bias Correct' : 'Bias Wrong') : '';
  return '<div class="scroll-body">' +
    '<div class="grp-lbl">Shadow Weights</div>' +
    '<div class="shadow-inst-tabs">' + instTabsH + '</div>' +
    statsH + tableH +
    '<div class="res-actions" style="margin-top:16px">' +
      (last ? '<button class="res-btn" style="border-color:#F5A623;color:#F5A623" onclick="revertLastEntry(\'' + si + '\')">↩ Revert Last Entry (' + revertLabel + ')</button>' : '') +
      '<button class="res-btn primary" onclick="exportShadowWeights(\'' + si + '\')">Export Shadow Weights (JSON)</button>' +
      '<button class="res-btn" onclick="resetShadowWeights(\'' + si + '\')">Reset to Base Weights</button>' +
    '</div>' +
  '</div>';
}

function setShadowInst(inst) { S.shadowInst = inst; render(); }

function goShadow() {
  S._shadowBack = S.step;
  S.shadowInst = S.inst || 'eu';
  S.step = 'shadow';
  render();
}

function leaveShadow() {
  var back = S._shadowBack || 'home';
  if (back === 'home' || !S.inst) { goHome(); } else { S.step = back; render(); }
}

function exportShadowWeights(inst) {
  var text = JSON.stringify(getCachedShadow(inst).weights || {}, null, 2);
  var btn = document.querySelector('[onclick^="exportShadow"]');
  function ok() { if (btn) { btn.textContent = '✓ Copied!'; setTimeout(function(){ btn.textContent = 'Export Shadow Weights (JSON)'; }, 1800); } }
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(ok).catch(function(){ fallbackCopy(text, ok); }); }
  else { fallbackCopy(text, ok); }
}

function resetShadowWeights(inst) {
  if (!confirm('Reset all shadow weights for ' + DATA[inst].name + '?\n\nLog files on GitHub will NOT be deleted.')) return;
  var blank = Object.assign({}, _SW_DEFAULT, { lastUpdated: new Date().toISOString() });
  setCachedShadow(inst, blank);
  if (ghEnabled()) pushShadowJSON(inst, blank);
  render();
}

function revertLastEntry(inst) {
  var cached = getCachedShadow(inst);
  var last = cached.lastEntry;
  if (!last || !last.adjustments || !last.adjustments.length) return;
  var sw = Object.assign({}, cached.weights || {});
  for (var i = 0; i < last.adjustments.length; i++) {
    sw[last.adjustments[i].id] = last.adjustments[i].oldW;
  }
  var isTrade = last.type === 'trade';
  var newData = {
    weights:    sw,
    tradeCount: Math.max(0, (cached.tradeCount || 0) - (isTrade ? 1 : 0)),
    wins:       Math.max(0, (cached.wins || 0)       - (isTrade && last.result === 'win'     ? 1 : 0)),
    losses:     Math.max(0, (cached.losses || 0)     - (isTrade && last.result === 'loss'    ? 1 : 0)),
    readCount:  Math.max(0, (cached.readCount || 0)  - (!isTrade ? 1 : 0)),
    correct:    Math.max(0, (cached.correct || 0)    - (!isTrade && last.result === 'correct' ? 1 : 0)),
    wrong:      Math.max(0, (cached.wrong || 0)      - (!isTrade && last.result === 'wrong'   ? 1 : 0)),
    lastUpdated: new Date().toISOString(),
    lastEntry: null
  };
  setCachedShadow(inst, newData);
  if (ghEnabled()) pushShadowJSON(inst, newData);
  render();
}

// ─── INIT ──────────────────────────────────────────────────────────────────
(function restoreState() {
  try {
    const saved = JSON.parse(localStorage.getItem('tm_state') || 'null');
    if (saved && saved.inst && saved.step && saved.step !== 'home') {
      S.inst = saved.inst;
      S.step = saved.step;
      S.fac = saved.fac || {};
      S.gates = saved.gates || {};
      S.model = saved.model || null;
      startSSE(S.inst);
    }
  } catch(e) {}
})();
render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

initShadowData('eu');
initShadowData('xau');
</script>
